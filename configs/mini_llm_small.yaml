model:
  vocab_size: 8000
  context_length: 256
  n_layers: 6
  d_model: 384
  n_heads: 6
  d_ff: 1536
  dropout: 0.1

training:
  batch_size: 32
  learning_rate: 0.0003
  max_steps: 3000
  eval_interval: 200
  checkpoint_interval: 500
  weight_decay: 0.01
  grad_clip: 1.0

tokenizer:
  type: word
  min_pair_freq: 2
  max_merges:
  max_training_bytes:

data:
  validation_split: 0.1
  seed: 42
