model:
  vocab_size: 3000
  context_length: 128
  n_layers: 2
  d_model: 128
  n_heads: 4
  d_ff: 512
  dropout: 0.1

training:
  batch_size: 16
  learning_rate: 0.0005
  max_steps: 500
  eval_interval: 50
  checkpoint_interval: 250
  weight_decay: 0.01
  grad_clip: 1.0

tokenizer:
  type: word
  min_pair_freq: 2
  max_merges:
  max_training_bytes:

data:
  validation_split: 0.1
  seed: 42
